<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link
      rel="icon"
      href="/favicon.svg"
      type="image/svg+xml"
    />
    <link
      rel="apple-touch-icon"
      href="/apple-touch-icon.png"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <!--
      Static fallback SEO tags below, marked with data-static-seo.
      Non-JS crawlers (social link-preview bots, some search bots) only ever
      see this shell, so they need real description/OG/Twitter data here.
      Once React mounts, main.tsx removes these in favor of the
      route-specific tags rendered by <PageSeo>, so the two sets never
      coexist in the DOM (avoids duplicate <title>/canonical/meta).
    -->
    <title data-static-seo>台灣工程師求職市場分析 | 碼的 上岸了</title>
    <meta
      data-static-seo
      name="description"
      content="碼的 上岸了：爬完台灣各大人力銀行的工程師職缺，算薪水、算技術熱度、算共現組合。看完數據，請去原平台投履歷。"
    />
    <link data-static-seo rel="canonical" href="https://codeshore.dev/" />

    <!-- Open Graph -->
    <meta data-static-seo property="og:type" content="website" />
    <meta data-static-seo property="og:site_name" content="碼的 上岸了" />
    <meta data-static-seo property="og:locale" content="zh_TW" />
    <meta
      data-static-seo
      property="og:title"
      content="台灣工程師求職市場分析 | 碼的 上岸了"
    />
    <meta
      data-static-seo
      property="og:description"
      content="碼的 上岸了：爬完台灣各大人力銀行的工程師職缺，算薪水、算技術熱度、算共現組合。看完數據，請去原平台投履歷。"
    />
    <meta data-static-seo property="og:url" content="https://codeshore.dev/" />
    <meta
      data-static-seo
      property="og:image"
      content="https://codeshore.dev/og-image.png"
    />
    <meta data-static-seo property="og:image:width" content="1200" />
    <meta data-static-seo property="og:image:height" content="630" />

    <!-- Twitter Card -->
    <meta data-static-seo name="twitter:card" content="summary_large_image" />
    <meta
      data-static-seo
      name="twitter:title"
      content="台灣工程師求職市場分析 | 碼的 上岸了"
    />
    <meta
      data-static-seo
      name="twitter:description"
      content="碼的 上岸了：爬完台灣各大人力銀行的工程師職缺，算薪水、算技術熱度、算共現組合。看完數據，請去原平台投履歷。"
    />
    <meta
      data-static-seo
      name="twitter:image"
      content="https://codeshore.dev/og-image.png"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://api.iconify.design" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Roboto+Mono&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@400,0..1&display=swap"

      />
      <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
      />
      <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@400,0..1&display=swap"
        rel="stylesheet"
      />

  </head>
  <body class="bg-surface font-body text-on-surface">

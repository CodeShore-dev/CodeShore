steps:
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker pull ${_IMAGE}-builder || true
        docker pull $_IMAGE || true

  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        DOCKER_BUILDKIT=1 docker build \
          --build-arg VER=$SHORT_SHA \
          --build-arg BUILDKIT_INLINE_CACHE=1 \
          --cache-from ${_IMAGE}-builder \
          --cache-from $_IMAGE \
          --target builder \
          -t ${_IMAGE}-builder \
          -f Dockerfile.cloudrun . \
        && DOCKER_BUILDKIT=1 docker build \
          --build-arg VER=$SHORT_SHA \
          --build-arg BUILDKIT_INLINE_CACHE=1 \
          --cache-from ${_IMAGE}-builder \
          --cache-from $_IMAGE \
          -t $_IMAGE \
          -f Dockerfile.cloudrun .

  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker push ${_IMAGE}-builder
        docker push $_IMAGE

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - '$_SERVICE'
      - '--image=$_IMAGE'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=2Gi'
      - '--cpu=2'
      - '--timeout=300'
      - '--set-env-vars=NODE_ENV=production'
      - '--set-secrets=SUPABASE_URL=supabase-url:latest,SUPABASE_SERVICE_ROLE_KEY=supabase-service-role-key:latest'

substitutions:
  _REGION: asia-east1
  _SERVICE: codeshore
  _REPO: cloud-run-source-deploy
  _IMAGE: '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/$REPO_NAME/${_SERVICE}:$SHORT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY

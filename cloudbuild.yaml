availableSecrets:
  secretManager:
  - versionName: projects/$PROJECT_ID/secrets/vite-supabase-url/versions/latest
    env: VITE_SUPABASE_URL
  - versionName: projects/$PROJECT_ID/secrets/vite-supabase-anon-key/versions/latest
    env: VITE_SUPABASE_ANON_KEY
  - versionName: projects/$PROJECT_ID/secrets/vite-admin-emails/versions/latest
    env: VITE_ADMIN_EMAILS
  - versionName: projects/$PROJECT_ID/secrets/vite-ga-measurement-id/versions/latest
    env: VITE_GA_MEASUREMENT_ID

steps:
  - name: 'gcr.io/cloud-builders/docker'
    id: CreateFrontendEnv
    entrypoint: bash
    args:
      - '-c'
      - |
        printf "VITE_SUPABASE_URL=%s\nVITE_SUPABASE_ANON_KEY=%s\nVITE_ADMIN_EMAILS=%s\nVITE_GA_MEASUREMENT_ID=%s\n" \
          "$$VITE_SUPABASE_URL" "$$VITE_SUPABASE_ANON_KEY" "$$VITE_ADMIN_EMAILS" "$$VITE_GA_MEASUREMENT_ID" \
          > apps/frontend/.env
    secretEnv:
      - VITE_SUPABASE_URL
      - VITE_SUPABASE_ANON_KEY
      - VITE_ADMIN_EMAILS
      - VITE_GA_MEASUREMENT_ID

  - name: 'gcr.io/cloud-builders/git'
    id: FetchTags
    args: ['fetch', '--unshallow', '--tags']

  - name: 'gcr.io/cloud-builders/git'
    id: ComputeVer
    entrypoint: bash
    args:
      - '-c'
      - |
        VER=$(git describe --tags --always)
        echo "$VER" > /workspace/_ver.txt
        echo "APP_VER=$VER"
    waitFor: ['FetchTags']

  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker pull ${_CACHE_IMAGE}-builder || true &
        docker pull ${_CACHE_IMAGE} || true &
        wait

  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        VER=$(cat /workspace/_ver.txt)
        docker build \
          --build-arg VER="$VER" \
          --cache-from ${_CACHE_IMAGE}-builder \
          --target builder \
          -t ${_CACHE_IMAGE}-builder \
          -f Dockerfile.cloudrun . \
        && docker build \
          --build-arg VER="$VER" \
          --cache-from ${_CACHE_IMAGE} \
          -t $_IMAGE \
          -f Dockerfile.cloudrun . \
        && docker tag $_IMAGE ${_CACHE_IMAGE}
    waitFor: ['ComputeVer']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '$_IMAGE']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - '$_SERVICE'
      - '--image=$_IMAGE'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=2Gi'
      - '--cpu=2'
      - '--timeout=300'
      - '--set-env-vars=NODE_ENV=production'
      - '--set-secrets=SUPABASE_URL=supabase-url:latest,SUPABASE_SERVICE_ROLE_KEY=supabase-service-role-key:latest'

images:
  - '${_CACHE_IMAGE}-builder'
  - '${_CACHE_IMAGE}'

substitutions:
  _REGION: asia-east1
  _SERVICE: codeshore
  _REPO: cloud-run-source-deploy
  _IMAGE: '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/$REPO_NAME/${_SERVICE}:$SHORT_SHA'
  _CACHE_IMAGE: '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/$REPO_NAME/${_SERVICE}:latest'

options:
  logging: CLOUD_LOGGING_ONLY

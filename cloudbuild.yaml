steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '--build-arg'
      - 'VER=$SHORT_SHA'
      - '-t'
      - '$_IMAGE'
      - '-f'
      - 'Dockerfile.cloudrun'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '$_IMAGE']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - '$_SERVICE'
      - '--image=$_IMAGE'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--set-env-vars=NODE_ENV=production'

substitutions:
  _REGION: asia-east1
  _SERVICE: backend
  _REPO: codeshore
  _IMAGE: '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$SHORT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY

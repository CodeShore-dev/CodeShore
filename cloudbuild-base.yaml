steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['pull', 'node:22.14.0-alpine']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['tag', 'node:22.14.0-alpine', 'asia-east1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/node:22.14.0-alpine']

images:
  - 'asia-east1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/node:22.14.0-alpine'

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['pull', 'node:22.14.0-slim']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['tag', 'node:22.14.0-slim', 'asia-east1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/node:22.14.0-slim']

images:
  - 'asia-east1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/node:22.14.0-slim'

options:
  logging: CLOUD_LOGGING_ONLY

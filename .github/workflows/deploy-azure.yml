name: Deploy to Azure (Container Apps)

# 對應 GCP Cloud Run 的長駐容器方案，但目標是 Azure Container Apps
# （scale-to-zero、永久免費月額度：18萬 vCPU-秒 + 36萬 GiB-秒 + 200萬請求/月）。
# 映像推到 ghcr.io，ACA 直接從 ghcr.io 拉（不再經由 Azure Container Registry，省掉 ACR 固定月費）。
# 流程：build image -> push 到 ghcr.io -> 建立/更新 Container App + 對外 ingress。
# 第一次執行會自動建立 resource group / environment / app；之後只更新映像與環境變數。
#
# 前置（一次性，需訂閱 Owner，見 scripts/AZURE-DEPLOY.md）：先用你本人帳號在 Cloud Shell 註冊
# 資源供應者，否則 RG-scoped 的 SP 會報 AuthorizationFailed: Microsoft.App/register/action：
#   az provider register -n Microsoft.App --wait
# （不用 Log Analytics，故不需註冊 Microsoft.OperationalInsights）
#
# codeshore package 目前是 private，所以 Container App 用長效 PAT（GHCR_PAT secret，
# scope: read:packages，注意組織政策限制 classic PAT 效期需 <= 366 天）當 registry 密碼，
# 不用短效 GITHUB_TOKEN，避免 scale-from-zero 時憑證已過期而 pull 失敗（DENIED）。
# 若之後把 package 改成 Public，可移除這段 registry 設定改用匿名拉取。
#
# 觸發：push 到 main 自動部署，外加 workflow_dispatch 可手動 Run。
# 注意：必須先設好 AZURE_CREDENTIALS、GHCR_PAT 等 Secrets，否則每次 push 都會失敗。
on:
  workflow_dispatch: {}
  push:
    branches: [main]

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository }}/codeshore
  RESOURCE_GROUP: codeshore-rg
  LOCATION: eastasia            # 東亞（台北/香港），離 GCP asia-east1 最近
  ENVIRONMENT: codeshore-env
  APP_NAME: codeshore
  TARGET_PORT: 8080             # bootstrap() 固定 listen 8080

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # 取得 tags 以計算版本號

      - name: Compute version
        id: ver
        run: echo "value=$(git describe --tags --always)" >> "$GITHUB_OUTPUT"

      - name: Lowercase GHCR image name
        id: img
        run: echo "name=${GHCR_IMAGE,,}" >> "$GITHUB_OUTPUT"

      # 前端 VITE_* 變數在 build 時就會被打包進 JS bundle，必須先寫好 .env
      - name: Create frontend .env
        run: |
          cat > apps/frontend/.env <<EOF
          VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_ADMIN_EMAILS=${{ secrets.VITE_ADMIN_EMAILS }}
          EOF

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.aws
          build-args: |
            VER=${{ steps.ver.outputs.value }}
          push: true
          tags: |
            ${{ steps.img.outputs.name }}:${{ github.sha }}
            ${{ steps.img.outputs.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Container Apps
        uses: azure/cli@v2
        env:
          IMAGE_REF: ${{ steps.img.outputs.name }}:${{ github.sha }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        with:
          azcliversion: latest
          inlineScript: |
            set -e
            az config set extension.use_dynamic_install=yes_without_prompt -o none

            # 確保 resource group
            az group create -n "$RESOURCE_GROUP" -l "$LOCATION" -o none

            # 確保 Container Apps 環境。--logs-destination none：不建 Log Analytics
            # （省掉超過 5GB/月的計費風險）；即時 log 仍可用 az containerapp logs show 看。
            az containerapp env show -n "$ENVIRONMENT" -g "$RESOURCE_GROUP" >/dev/null 2>&1 \
              || az containerapp env create -n "$ENVIRONMENT" -g "$RESOURCE_GROUP" -l "$LOCATION" \
                   --logs-destination none -o none

            if az containerapp show -n "$APP_NAME" -g "$RESOURCE_GROUP" >/dev/null 2>&1; then
              echo "更新既有 Container App ..."
              az containerapp registry set -n "$APP_NAME" -g "$RESOURCE_GROUP" \
                --server ghcr.io \
                --username "${{ github.actor }}" \
                --password "$GHCR_PAT" -o none
              az containerapp update -n "$APP_NAME" -g "$RESOURCE_GROUP" \
                --image "$IMAGE_REF" \
                --set-env-vars \
                  NODE_ENV=production \
                  SUPABASE_URL="$SUPABASE_URL" \
                  SUPABASE_SERVICE_ROLE_KEY="$SUPABASE_SERVICE_ROLE_KEY" -o none
            else
              echo "首次建立 Container App ..."
              az containerapp create -n "$APP_NAME" -g "$RESOURCE_GROUP" \
                --environment "$ENVIRONMENT" \
                --image "$IMAGE_REF" \
                --registry-server ghcr.io \
                --registry-username "${{ github.actor }}" \
                --registry-password "$GHCR_PAT" \
                --target-port "$TARGET_PORT" \
                --ingress external \
                --min-replicas 0 --max-replicas 1 \
                --cpu 0.5 --memory 1.0Gi \
                --env-vars \
                  NODE_ENV=production \
                  SUPABASE_URL="$SUPABASE_URL" \
                  SUPABASE_SERVICE_ROLE_KEY="$SUPABASE_SERVICE_ROLE_KEY" -o none
            fi

            FQDN=$(az containerapp show -n "$APP_NAME" -g "$RESOURCE_GROUP" \
              --query properties.configuration.ingress.fqdn -o tsv)
            echo "### Azure Container App URL: https://$FQDN" >> "$GITHUB_STEP_SUMMARY"
            echo "把這個網址（去掉結尾的 /）填進 cloudflare/worker/main.js 的 azure 欄位"
            echo "FQDN = https://$FQDN"

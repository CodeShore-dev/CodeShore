name: Deploy to AWS (EC2)

# 對應 GCP 的 Cloud Build trigger：push 到 main 自動 build + 部署。
# 流程：build image -> push 到 GitHub Container Registry (ghcr.io) -> SSH 進 EC2 pull & 重啟。
on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  IMAGE: ghcr.io/${{ github.repository }}/codeshore

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 取得 tags 以計算版本號

      - name: Compute version
        id: ver
        run: echo "value=$(git describe --tags --always)" >> "$GITHUB_OUTPUT"

      - name: Lowercase image name
        id: img
        run: echo "name=${IMAGE,,}" >> "$GITHUB_OUTPUT"

      # 前端 VITE_* 變數在 build 時就會被打包進 JS bundle，必須先寫好 .env
      - name: Create frontend .env
        run: |
          cat > apps/frontend/.env <<EOF
          VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_ADMIN_EMAILS=${{ secrets.VITE_ADMIN_EMAILS }}
          EOF

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.aws
          build-args: |
            VER=${{ steps.ver.outputs.value }}
          push: true
          tags: |
            ${{ steps.img.outputs.name }}:${{ github.sha }}
            ${{ steps.img.outputs.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to EC2 over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: IMAGE_REF,GHCR_USER,GHCR_TOKEN,SUPABASE_URL,SUPABASE_SERVICE_ROLE_KEY
          script: |
            set -e
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            docker pull "$IMAGE_REF"
            docker rm -f codeshore 2>/dev/null || true
            docker run -d --name codeshore --restart unless-stopped \
              -p 8080:8080 \
              -e NODE_ENV=production \
              -e SUPABASE_URL="$SUPABASE_URL" \
              -e SUPABASE_SERVICE_ROLE_KEY="$SUPABASE_SERVICE_ROLE_KEY" \
              "$IMAGE_REF"
            docker image prune -f
        env:
          IMAGE_REF: ${{ steps.img.outputs.name }}:${{ github.sha }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
